name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Generate theme CSS
        run: npm run build:themes
      - name: Verify themes.css is up to date
        run: git diff --exit-code src/styles/themes.css
      - name: Build styleguide
        run: npm run build
      - name: Build library
        run: npm run build:lib
